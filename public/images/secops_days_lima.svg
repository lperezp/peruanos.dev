<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SecOps Days Lima 2026 - Cumbre de Ciberseguridad Latinoamerica</title>
  <desc id="desc">Imagen Open Graph con fondo oscuro, glow verde y texto del evento SecOps Days Lima 2026.</desc>

  <defs>
    <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.06)" />
    </pattern>

    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(16,185,129,0.18)" />
      <stop offset="70%" stop-color="rgba(16,185,129,0)" />
    </radialGradient>

    <linearGradient id="topAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(16,185,129,0)" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="rgba(16,185,129,0)" />
    </linearGradient>

    <filter id="greenSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#050505" />
  <rect width="1200" height="630" fill="url(#dotGrid)" />

  <ellipse cx="600" cy="315" rx="350" ry="225" fill="url(#greenGlow)" />
  <rect x="0" y="0" width="1200" height="2" fill="url(#topAccent)" />

  <path d="M48 40h20M48 40v20" stroke="rgba(16,185,129,0.5)" stroke-width="1.5" fill="none" />
  <path d="M1152 40h-20M1152 40v20" stroke="rgba(16,185,129,0.5)" stroke-width="1.5" fill="none" />
  <path d="M48 590h20M48 590v-20" stroke="rgba(16,185,129,0.5)" stroke-width="1.5" fill="none" />
  <path d="M1152 590h-20M1152 590v-20" stroke="rgba(16,185,129,0.5)" stroke-width="1.5" fill="none" />

  <g transform="translate(600 180)">
    <rect x="-220" y="-12" width="8" height="8" fill="#10b981" filter="url(#greenSoftGlow)" />
    <text x="-198" y="-4" fill="#10b981" font-family="monospace" font-size="14" font-weight="600" letter-spacing="4.2" text-anchor="start">
      SECOPS DAYS LIMA · 2026
    </text>
  </g>

  <g transform="translate(600 300)">
    <text x="0" y="0" fill="#ffffff" font-family="sans-serif" font-size="72" font-weight="900" letter-spacing="-2.16" text-anchor="middle">
      Cumbre de Ciberseguridad
    </text>
    <text x="0" y="74" fill="rgba(255,255,255,0.35)" font-family="sans-serif" font-size="72" font-weight="900" letter-spacing="-2.16" text-anchor="middle">
      Latinoamerica
    </text>
  </g>

  <text x="600" y="430" fill="rgba(255,255,255,0.45)" font-family="monospace" font-size="18" letter-spacing="1.44" text-anchor="middle">
    25 Jun 2026 · Centro de Convenciones ESAN · Lima, Peru
  </text>

  <g transform="translate(360 462)">
    <g>
      <rect x="0" y="0" width="104" height="30" fill="rgba(16,185,129,0.04)" stroke="rgba(16,185,129,0.35)" />
      <text x="52" y="20" fill="rgba(16,185,129,0.85)" font-family="monospace" font-size="11" letter-spacing="2.2" text-anchor="middle">RED TEAM</text>
    </g>
    <g transform="translate(114 0)">
      <rect x="0" y="0" width="104" height="30" fill="rgba(16,185,129,0.04)" stroke="rgba(16,185,129,0.35)" />
      <text x="52" y="20" fill="rgba(16,185,129,0.85)" font-family="monospace" font-size="11" letter-spacing="2.2" text-anchor="middle">BLUE TEAM</text>
    </g>
    <g transform="translate(228 0)">
      <rect x="0" y="0" width="78" height="30" fill="rgba(16,185,129,0.04)" stroke="rgba(16,185,129,0.35)" />
      <text x="39" y="20" fill="rgba(16,185,129,0.85)" font-family="monospace" font-size="11" letter-spacing="2.2" text-anchor="middle">CISO</text>
    </g>
    <g transform="translate(316 0)">
      <rect x="0" y="0" width="66" height="30" fill="rgba(16,185,129,0.04)" stroke="rgba(16,185,129,0.35)" />
      <text x="33" y="20" fill="rgba(16,185,129,0.85)" font-family="monospace" font-size="11" letter-spacing="2.2" text-anchor="middle">CTF</text>
    </g>
    <g transform="translate(392 0)">
      <rect x="0" y="0" width="58" height="30" fill="rgba(16,185,129,0.04)" stroke="rgba(16,185,129,0.35)" />
      <text x="29" y="20" fill="rgba(16,185,129,0.85)" font-family="monospace" font-size="11" letter-spacing="2.2" text-anchor="middle">AI</text>
    </g>
  </g>

  <text x="1148" y="602" fill="rgba(255,255,255,0.2)" font-family="monospace" font-size="12" letter-spacing="1.8" text-anchor="end">
    secopsdays.org
  </text>
</svg>
